services:
  piper:
    build: .
    container_name: piper
    restart: unless-stopped

    ports:
      - "8002:5000"

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/voices')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
